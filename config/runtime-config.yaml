auth:
  - type: oidc
    config:
      oidc_discovery_url: https://auth.oddbit.com/realms/oddbit
      default_role: admin
      oidc_client_id: oddbit-vault
      oidc_client_secret: "${ env `ODDBIT_CLIENT_SECRET` }"
    roles:
      - name: admin
        policies: admin
        user_claim: name
        allowed_redirect_uris:
          - https://vault.oddbit.com/ui/vault/auth/oidc/oidc/callback
          - http://localhost:8250/oidc/callback

policies:
  - name: vault-backup
    rules: "path \"sys/storage/raft/snapshot\" {\n  capabilities = [\"read\"]\n}\n"
  - name: oddnot-writer
    rules: |
      path "oddbit/*" {
        capabilities = ["read", "list", "create", "delete", "update"]
      }
  - name: oddbit-reader
    rules: |
      path "oddbit/*" {
        capabilities = ["read", "list"]
      }
  - name: oddbit-reader
    rules: |
      path "oddbit/*" {
        capabilities = ["read", "list"]
      }
  - name: caara-races-reader
    rules: |
      path "caara-races/*" {
        capabilities = ["read", "list"]
      }
  - name: baystateradio-reader
    rules: |
      path "baystateradio/*" {
        capabilities = ["read", "list"]
      }
secrets:
  - description: General secrets for oddbit.com.
    options:
      version: 2
    path: oddbit
    type: kv
  - description: General secrets for caara-races
    options:
      version: 2
    path: caara-races
    type: kv
  - description: General secrets for baystateradio
    options:
      version: 2
    path: baystateradio
    type: kv
