apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - update
      - patch
      - get
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - get
      - list
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: default
